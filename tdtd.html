<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuan Dung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent: #a8ff78;
    --accent2: #78ffd6;
    --glow: rgba(168,255,120,0.18);
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --text: #f0f0f0;
    --text-muted: rgba(240,240,240,0.55);
  }

  body {
    min-height: 100vh;
    background: #0b0e0d;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Animated forest bg */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(20,60,30,0.85) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 20% 80%, rgba(10,40,20,0.7) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 70%, rgba(5,25,15,0.6) 0%, transparent 60%),
      linear-gradient(180deg, #060a08 0%, #0e1f14 40%, #0a1a10 100%);
  }

  /* Floating particles */
  .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
  .particle {
    position: absolute;
    width: 3px; height: 3px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0;
    animation: float linear infinite;
  }
  @keyframes float {
    0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-10vh) translateX(var(--drift)); opacity: 0; }
  }

  /* Navbar */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.5rem;
  }
  .nav-menu { font-size: 1.3rem; cursor: pointer; color: var(--text-muted); transition: color 0.2s; }
  .nav-menu:hover { color: var(--text); }
  .nav-status {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.75rem; color: var(--text-muted);
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #4ade80;
    box-shadow: 0 0 6px #4ade80;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .status-label { color: var(--text); font-weight: 500; }

  /* Main card */
  .profile-wrap {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
    padding: 2rem 1rem 3rem;
    min-height: 100vh;
    justify-content: center;
    gap: 0;
  }

  /* Avatar */
  .avatar-ring {
    position: relative;
    width: 110px; height: 110px;
    margin-bottom: 1.4rem;
  }
  .avatar-ring svg {
    position: absolute; inset: -8px;
    width: calc(100% + 16px); height: calc(100% + 16px);
    animation: spin 6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .avatar-img {
    width: 110px; height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(168,255,120,0.3);
    background: #1a2e1a;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem;
    overflow: hidden;
    position: relative; z-index: 2;
  }
  .avatar-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

  /* Name */
  .name {
    font-family: 'Cinzel', serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 600;
    letter-spacing: 0.04em;
    color: #fff;
    text-shadow: 0 0 40px rgba(168,255,120,0.2);
    margin-bottom: 0.5rem;
    line-height: 1.1;
  }

  /* Bio tags */
  .bio {
    font-size: 0.85rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    margin-bottom: 1.2rem;
    display: flex; align-items: center; gap: 0.5rem;
    flex-wrap: wrap; justify-content: center;
  }
  .bio-sep { color: rgba(168,255,120,0.4); }

  /* Location pill */
  .location-pill {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: var(--glass);
    border: 0.5px solid var(--glass-border);
    border-radius: 999px;
    padding: 0.35rem 1rem;
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-bottom: 1.4rem;
    backdrop-filter: blur(8px);
  }
  .location-pill .flag { font-size: 0.9rem; }

  /* Now playing */
  .now-playing {
    display: inline-flex; align-items: center; gap: 0.7rem;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 999px;
    padding: 0.5rem 1.2rem 0.5rem 0.7rem;
    margin-bottom: 2rem;
    font-size: 0.78rem;
    backdrop-filter: blur(10px);
    max-width: 280px;
  }
  .np-btn {
    width: 30px; height: 30px; border-radius: 50%;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
  }
  .np-btn svg { color: #000; }
  .np-track { color: #a78bfa; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
  .np-bars {
    display: flex; align-items: flex-end; gap: 2px;
    height: 14px; flex-shrink: 0;
  }
  .np-bar {
    width: 3px; background: #a78bfa; border-radius: 2px;
    animation: bar ease-in-out infinite alternate;
  }
  .np-bar:nth-child(1){ height: 6px;  animation-duration: 0.5s; animation-delay: 0s; }
  .np-bar:nth-child(2){ height: 12px; animation-duration: 0.7s; animation-delay: 0.1s; }
  .np-bar:nth-child(3){ height: 8px;  animation-duration: 0.4s; animation-delay: 0.2s; }
  .np-bar:nth-child(4){ height: 14px; animation-duration: 0.6s; animation-delay: 0.05s; }
  @keyframes bar { from{transform:scaleY(0.3)} to{transform:scaleY(1)} }

  /* Social links */
  .socials {
    display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center;
  }
  .social-btn {
    width: 52px; height: 52px;
    background: rgba(255,255,255,0.07);
    border: 0.5px solid rgba(255,255,255,0.13);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    backdrop-filter: blur(8px);
    color: var(--text);
  }
  .social-btn:hover {
    background: rgba(168,255,120,0.12);
    border-color: rgba(168,255,120,0.3);
    transform: translateY(-3px);
  }
  .social-btn svg { width: 22px; height: 22px; }

  /* Subtle vignette overlay */
  .vignette {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
  }

  /* Tree silhouettes */
  .trees {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 3;
    pointer-events: none;
    height: 220px;
    opacity: 0.35;
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="vignette"></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<!-- Tree silhouettes -->

  <polygon points="0,220 60,60 120,220" fill="#0a1f0e"/>
  <polygon points="40,220 110,30 180,220" fill="#0e2a14"/>

  <polygon points="160,220 220,50 290,220" fill="#0e2a14"/>
  <polygon points="230,220 295,80 360,220" fill="#0a1f0e"/>
  <!-- right trees -->
  <polygon points="1080,220 1140,55 1200,220" fill="#0a1f0e"/>
  <polygon points="1150,220 1220,35 1290,220" fill="#0e2a14"/>
  <polygon points="1230,220 1290,65 1360,220" fill="#0a1f0e"/>
  <polygon points="1310,220 1375,45 1440,220" fill="#0e2a14"/>
  <polygon points="1380,220 1440,80 1440,220" fill="#0a1f0e"/>

  <path d="M 350 0 Q 370 80 360 160 Q 350 200 355 220" stroke="#1a3d20" stroke-width="2" fill="none"/>
  <path d="M 1090 0 Q 1070 100 1080 180 Q 1090 210 1085 220" stroke="#1a3d20" stroke-width="2" fill="none"/>
</svg>

<!-- Nav -->
<nav class="nav">
  <div class="nav-menu">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </div>
  <div class="nav-status">
    <div class="status-dot"></div>
    <span class="status-label">Online</span>
    <span>Không hoạt động</span>
  </div>
</nav>

<!-- Profile -->
<main class="profile-wrap">

  <!-- Avatar -->
  <div class="avatar-ring">
    <svg viewBox="0 0 126 126" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="63" cy="63" r="58" stroke="url(#ringGrad)" stroke-width="2.5" stroke-dasharray="8 4" stroke-linecap="round"/>
      <defs>
        <linearGradient id="ringGrad" x1="0" y1="0" x2="126" y2="126" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#a8ff78"/>
          <stop offset="50%" stop-color="#78ffd6"/>
          <stop offset="100%" stop-color="#a8ff78" stop-opacity="0.1"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="avatar-img">🐱</div>
  </div>

  <!-- Name -->
  <h1 class="name">Tuan Dung</h1>

  <!-- Bio -->
  <p class="bio">
    <span>Introverted</span>
    <span class="bio-sep">|</span>
    <span>XX Lover</span>
    <span class="bio-sep">|</span>
    <span>The Cat</span>
  </p>

  <!-- Location -->
  <div class="location-pill">
    <span class="flag">🇻🇳</span>
    <span>Việt Nam</span>
  </div>

  <!-- Now playing -->
  <div class="now-playing">
    <div class="np-btn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="#000"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    </div>
    <span class="np-track">^_^</span>
    <div class="np-bars">
      <div class="np-bar"></div>
      <div class="np-bar"></div>
      <div class="np-bar"></div>
      <div class="np-bar"></div>
    </div>
  </div>

  <!-- Socials -->
  <div class="socials">
    <!-- Facebook -->
    <a class="social-btn" href="https://facebook.com" target="_blank" title="Facebook">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
    </a>
    <!-- TikTok -->
    <a class="social-btn" href="https://tiktok.com" target="_blank" title="TikTok">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.32 6.32 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34l-.01-8.83a8.18 8.18 0 0 0 4.78 1.52V4.56a4.85 4.85 0 0 1-1-.13z"/></svg>
    </a>
    <!-- Discord -->
    <a class="social-btn" href="https://discord.com" target="_blank" title="Discord">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
    </a>
    <!-- Roblox -->
    <a class="social-btn" href="https://roblox.com" target="_blank" title="Roblox">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M 5.843 0 L 0 17.568 L 18.157 24 L 24 6.435 Z M 14.382 14.542 L 9.615 12.868 L 11.289 8.01 L 16.056 9.684 Z"/></svg>
    </a>
    <!-- GitHub -->
    <a class="social-btn" href="https://github.com" target="_blank" title="GitHub">

    <!-- Spotify -->

    </a>
  </div>

</main>

<script>
  // Generate floating particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1;
    p.style.cssText = `
      left: ${Math.random()*100}%;
      width: ${size}px; height: ${size}px;
      animation-duration: ${6 + Math.random()*10}s;
      animation-delay: ${-Math.random()*15}s;
      --drift: ${(Math.random()-0.5)*120}px;
      opacity: 0;
      ${Math.random() > 0.5 ? 'background: #78ffd6;' : ''}
    `;
    container.appendChild(p);
  }
</script>
</body>
</html>
